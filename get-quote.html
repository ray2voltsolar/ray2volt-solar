<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="R2V Shock symbol.png">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18014889887"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'AW-18014889887');
    </script>
    <!-- Event snippet for Request quote conversion page
    In your html page, add the snippet and call gtag_report_conversion when someone clicks on the chosen link or button. -->
    <script>
        function gtag_report_conversion(url) {
            var callback = function () {
                if (typeof (url) != 'undefined') {
                    window.location = url;
                }
            };
            gtag('event', 'conversion', {
                'send_to': 'AW-18014889887/qXFqCMnQrIgcEJ_PlY5D',
                'value': 1.0,
                'currency': 'INR',
                'event_callback': callback
            });
            return false;
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Get a free solar quote from Ray2Volt Solar. Fill out our simple form with your details and we'll get back to you with a customized solar solution.">
    <title>Get Quote | Ray2Volt Solar</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <meta property="og:site_name" content="Ray2Volt Solar">

    <style>
        .simple-quote-section {
            min-height: calc(100vh - 90px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            margin-top: 90px;
            /* Offset for header */
        }

        @media (max-width: 768px) {
            .simple-quote-section {
                align-items: flex-start;
                margin-top: 70px;
                padding-top: 1rem;
            }
        }

        .quote-container {
            width: 100%;
            max-width: 480px;
        }

        .step-label {
            display: block;
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 1.25rem;
            text-align: center;
            font-family: var(--font-heading);
        }

        /* Segmented Control / Selector - Dark Mode Adapted */
        .type-selector {
            display: flex;
            gap: 0.5rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 0.375rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .type-option {
            flex: 1;
            position: relative;
            cursor: pointer;
        }

        .type-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .type-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.875rem 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .type-option input:checked+.type-btn {
            background: linear-gradient(135deg, var(--secondary-gold) 0%, var(--secondary-dark) 100%);
            color: var(--gray-900);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .form-inputs {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        /* Subtle Animations */
        .animate-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- Header / Navigation -->
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Ray2Volt Solar Logo" onerror="this.style.display='none'">
                <div class="logo-text">
                    Ray2Volt Solar
                    <span>Pvt Ltd</span>
                </div>
            </a>

            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About Us</a></li>
                <li><a href="residential.html" class="nav-link">Residential</a></li>
                <li><a href="commercial.html" class="nav-link">Commercial</a></li>
                <li><a href="investor.html" class="nav-link">Investors</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>

            <button class="menu-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <!-- Simplified Form Section -->
    <section class="simple-quote-section">
        <div class="quote-container card">
            <form id="quote-form" action="https://formsubmit.co/sales@ray2voltsolar.com" method="POST">
                <input type="hidden" name="_subject" value="New Quote Request - Ray2Volt Solar">
                <input type="hidden" name="_template" value="table">
                <input type="hidden" name="_autoresponse"
                    value="Thank you for requesting a quote from Ray2Volt Solar! Our team will review your details and get back to you with a customized solution soon.">

                <!-- 1. What do you need solar for -->
                <div class="form-step animate-up">
                    <label class="step-label">What do you need solar for?</label>
                    <div class="type-selector">
                        <label class="type-option">
                            <input type="radio" name="property_type" value="residential" required checked>
                            <span class="type-btn">Residential</span>
                        </label>
                        <label class="type-option">
                            <input type="radio" name="property_type" value="commercial" required>
                            <span class="type-btn">Commercial</span>
                        </label>
                    </div>
                </div>

                <div class="form-inputs">
                    <!-- 2. Your Name -->
                    <div class="form-group animate-up delay-1">
                        <label for="name">Your Name *</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Enter your full name"
                            required>
                    </div>

                    <!-- 3. Mobile Number -->
                    <div class="form-group animate-up delay-2">
                        <label for="phone">Mobile Number *</label>
                        <input type="tel" id="phone" name="phone" class="form-control" placeholder="+91 9666068140"
                            required>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="animate-up delay-3">
                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;"
                        onclick="gtag_report_conversion()">
                        Get Free Quote
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2" style="width: 20px; height: 20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>

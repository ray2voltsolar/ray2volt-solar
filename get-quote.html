    <style>
        .simple-quote-section {
            min-height: calc(100vh - 90px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            margin-top: 90px;
            /* Offset for header */
        }

        @media (max-width: 768px) {
            .simple-quote-section {
                align-items: flex-start;
                margin-top: 70px;
                padding-top: 1rem;
            }
        }

        .quote-container {
            width: 100%;
            max-width: 480px;
        }

        .step-label {
            display: block;
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 1.25rem;
            text-align: center;
            font-family: var(--font-heading);
        }

        /* Segmented Control / Selector - Dark Mode Adapted */
        .type-selector {
            display: flex;
            gap: 0.5rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 0.375rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .type-option {
            flex: 1;
            position: relative;
            cursor: pointer;
        }

        .type-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .type-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.875rem 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .type-option input:checked+.type-btn {
            background: linear-gradient(135deg, var(--secondary-gold) 0%, var(--secondary-dark) 100%);
            color: var(--gray-900);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .form-inputs {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        /* Subtle Animations */
        .animate-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

    <!-- Simplified Form Section -->
    <section class="simple-quote-section">
        <div class="quote-container card">
            <form id="quote-form" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="b3d2b2c1-4237-4de1-8879-9048dfa1beb8">

                <!-- 1. What do you need solar for -->
                <div class="form-step animate-up">
                    <label class="step-label">What do you need solar for?</label>
                    <div class="type-selector">
                        <label class="type-option">
                            <input type="radio" name="Property Type" value="Residential" required checked>
                            <span class="type-btn">Residential</span>
                        </label>
                        <label class="type-option">
                            <input type="radio" name="Property Type" value="Commercial" required>
                            <span class="type-btn">Commercial</span>
                        </label>
                    </div>
                </div>

                <div class="form-inputs">
                    <!-- 2. Your Name -->
                    <div class="form-group animate-up delay-1">
                        <label for="name">Your Name *</label>
                        <input type="text" id="name" name="Name" class="form-control" placeholder="Enter your full name"
                            required>
                    </div>

                    <!-- 3. Mobile Number -->
                    <div class="form-group animate-up delay-2">
                        <label for="phone">Mobile Number *</label>
                        <input type="tel" id="phone" name="Phone Number" class="form-control" placeholder="+91 9666068140"
                            required>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="animate-up delay-3">
                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                        Get Free Quote

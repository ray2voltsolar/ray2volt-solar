    <!-- Confetti Script -->
    <script>
    (function() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const colors = ['#FFB300', '#FF8F00', '#FFD54F', '#FF6B6B', '#EE5A24', '#38BDF8', '#10B981', '#fff'];
        const particles = [];
        const PARTICLE_COUNT = 150;
        let animFrame;
        let startTime = Date.now();
        const DURATION = 4000; // confetti lasts 4 seconds

        function random(min, max) { return Math.random() * (max - min) + min; }

        function createParticle() {
            return {
                x: random(0, canvas.width),
                y: random(-canvas.height, -10),
                w: random(6, 12),
                h: random(4, 8),
                color: colors[Math.floor(Math.random() * colors.length)],
                rotation: random(0, 360),
                rotationSpeed: random(-6, 6),
                velocityX: random(-2, 2),
                velocityY: random(2, 6),
                opacity: 1,
                gravity: random(0.02, 0.06),
                wobble: random(0, Math.PI * 2),
                wobbleSpeed: random(0.02, 0.06)
            };
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(createParticle());
        }

        function draw() {
            const elapsed = Date.now() - startTime;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (elapsed > DURATION) {
                // Fade out remaining
                let allGone = true;
                particles.forEach(p => {
                    p.opacity -= 0.02;
                    if (p.opacity > 0) allGone = false;
                });
                if (allGone) {
                    canvas.remove();
                    return;
                }
            }

            particles.forEach(p => {
                p.velocityY += p.gravity;
                p.x += p.velocityX + Math.sin(p.wobble) * 0.5;
                p.y += p.velocityY;
                p.rotation += p.rotationSpeed;
                p.wobble += p.wobbleSpeed;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate((p.rotation * Math.PI) / 180);
                ctx.globalAlpha = Math.max(0, p.opacity);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            });

            animFrame = requestAnimationFrame(draw);
        }

        draw();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    })();
    </script>
